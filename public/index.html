<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>配额查询系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app"></main>
    <script>
      if (location.protocol === "file:") {
        document.querySelector("#app").innerHTML = `
          <section style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7f9;color:#1b2228;">
            <div style="width:min(460px,100%);background:#fff;border:1px solid #d7dee5;border-radius:8px;padding:28px;box-shadow:0 18px 50px rgba(23,35,45,.12);">
              <h1 style="margin:0 0 10px;font-size:24px;">请通过本地服务打开</h1>
              <p style="margin:0 0 18px;color:#5f6c76;line-height:1.6;">配额查询系统需要后端接口支持，不能直接双击 HTML 文件打开。</p>
              <p style="margin:0;color:#5f6c76;line-height:1.6;">请在项目目录运行 <code>node server.js</code>，然后访问 <strong>http://localhost:3000</strong>。</p>
            </div>
          </section>
        `;
      }
    </script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
